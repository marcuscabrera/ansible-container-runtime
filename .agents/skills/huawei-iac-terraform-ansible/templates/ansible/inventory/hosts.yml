# inventory/hosts.yml — Huawei Cloud ECS Inventory
# Gerado via: terraform output -json ansible_inventory
---
all:
  children:
    ecs_app:
      hosts:
        app-01:
          ansible_host: CHANGEME  # IP privado da ECS
        # app-02:
        #   ansible_host: 10.148.1.11
    ecs_db:
      hosts:
        db-01:
          ansible_host: CHANGEME
    ecs_jump:
      hosts:
        jump-01:
          ansible_host: CHANGEME
          ansible_ssh_extra_args: "-o ProxyCommand='ssh -W %h:%p -q root@JUMP_PUBLIC_IP'"
    cce_masters:
      hosts:
        # CCE é gerenciado via kubectl, não SSH
        # Configurar kubeconfig via terraform output
        {}
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/huawei_ecs.pem
    hw_region: la-south-2
    hw_dns_private:
      - 100.125.0.250
      - 100.125.1.250
