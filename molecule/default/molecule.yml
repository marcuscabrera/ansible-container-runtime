---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: instance-rockylinux9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
  - name: instance-ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: /mnt/c/Tools/code/ansible-container/roles
  config_options:
    defaults:
      remote_tmp: /tmp/.ansible/tmp
  playbooks:
    converge: converge.yml
    verify: verify.yml
verifier:
  name: ansible
