[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
roles_path = ./roles
stdout_callback = default
callback_result_format = yaml
interpreter_python = auto_silent
timeout = 20
retry_files_enabled = False
forks = 5


[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
pipelining = True
scp_if_ssh = smart
transfer_method = smart
connect_timeout = 20
connect_retry_timeout = 15

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
